<!DOCTYPE html>
  <head>
    <title>Bouncing ball</title>
    <style>
      body {
        height: 100dvh;
        width: 100%;
        padding: 0;
        margin: 0;
      }

      canvas {
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <div style="position: absolute; width: 200px; height: fit-content; top:0; right: 0; background: white">
      <p>Settings</p>
      <input type="checkbox" onchange="enableAirResistance()">Air resistance</input>
      <input type="checkbox" onchange="enableWind()">Wind</input>
      <canvas id="wind_canvas" width="200" height="200"></canvas>
    </div>
    <script src="main.js"></script>
  </body>
</>
