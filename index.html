<!DOCTYPE html>
  <head>
    <title>Bouncing ball</title>
    <link rel="stylesheet" href="reset.css"/>
    <style>
      @font-face {
        font-family: 'ProggyClean';
        src: url('ProggyClean.ttf') format('truetype');
        font-weight: normal;
        font-style: normal;
      }

      body {
        height: 100dvh;
        width: 100%;
        padding: 0;
        margin: 0;
        font-family: 'ProggyClean';
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      .panel {
        position: absolute;
        width: 200px;
        height: fit-content;
        top: 20px;
        right: 20px;
        display: flex;
        flex-direction: column;
        align-items: start;
        background-color: #374eb4;
        color: white;
        padding: 10px;

        h2 {
          font-weight: bold;
          font-size: large;
        }

        .row {
          display: flex;
          align-items: center;
          gap: 5px;
        }

        #wind_canvas {
          margin-top: 10px;
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <div class="panel">
      <h2>Settings</h2>
      <div class="row">
        <input type="checkbox" onchange="enableAirResistance()"></input>
        <label>Air resistance</label>
      </div>
      <div class="row">
        <input type="checkbox" onchange="enableWind()"></input>
        <label>Wind</label>
      </div>
      <canvas id="wind_canvas" width="200" height="200"></canvas>
    </div>
    <script src="main.js"></script>
  </body>
</>
